name: Build Windows Executable

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Download code from repository
      uses: actions/checkout@v4

    - name: Install python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install packages and PyInstaller
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build .exe file
      run: |
        pyinstaller --noconfirm --onefile --windowed --add-data "assets;assets" src/main.py

    - name: Share game to download
      uses: actions/upload-artifact@v4
      with:
        name: ChessGame-Windows
        path: dist/*.exe